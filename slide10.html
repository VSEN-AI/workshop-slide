<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Step - Slide 10</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .final-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 4rem;
            align-items: center;
            margin-top: 3rem;
        }

        .cta-big {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 2rem;
            font-family: var(--font-heading);
            font-weight: 800;
        }

        .action-list {
            list-style: none;
        }
        .action-list li {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-secondary);
        }
        .action-list i {
            color: var(--accent-1);
            font-size: 1.75rem;
        }

        .qr-card {
            background: white;
            padding: 2.5rem;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: rotate(2deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .qr-card:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .qr-placeholder {
            width: 250px;
            height: 250px;
            background: #fff;
            border: 4px solid #f4f4f5;
            border-radius: 16px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12rem;
            color: #18181b; /* dark icon */
        }
        
        .qr-text {
            color: #18181b;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.5rem;
        }
        .qr-subtext {
            color: #52525b;
            font-size: 1rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .qa-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
            color: white;
            border-radius: 999px;
            font-size: 1.5rem;
            font-family: var(--font-heading);
            font-weight: 700;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.3);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div class="slide-container">
        <div class="content">
            <div class="badge" style="background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: #34d399;">
                <i class="ph ph-flag-checkered"></i> Conclusion
            </div>
            
            <div class="final-layout">
                <!-- Info Left -->
                <div>
                    <h2 class="cta-big">
                        Your Journey <br />
                        <span class="text-gradient-accent">Starts Today.</span>
                    </h2>
                    
                    <ul class="action-list">
                        <li><i class="ph-fill ph-users-three"></i> Join the vsen.ai exclusive community.</li>
                        <li><i class="ph-fill ph-calendar-check"></i> Register for upcoming deeper-dive batches.</li>
                        <li><i class="ph-fill ph-briefcase"></i> Land your first high-paying MNC role.</li>
                    </ul>

                    <div class="qa-badge">
                        <i class="ph-bold ph-chat-circle-question"></i> Open Q&A Session
                    </div>
                </div>

                <!-- QR Right -->
                <div class="qr-card">
                    <div class="qr-placeholder">
                        <i class="ph-bold ph-qr-code"></i>
                    </div>
                    <div class="qr-text">Scan to Connect</div>
                    <div class="qr-subtext">Join our WhatsApp Group</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-left" style="font-weight: 600; color: var(--text-primary);">vsen.ai</div>
            <div class="footer-center" style="font-family: var(--font-heading); letter-spacing: 0.1em; text-transform: uppercase;">From Pratapgarh to Global Tech.</div>
            <div class="footer-right">10 / 10</div>
        </div>
        <div class="progress-bar" style="width: 100%;"></div>
    </div>

    <div class="nav-hint">
        Use <span class="key">&rarr;</span> or <span class="key">&larr;</span> to navigate
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
