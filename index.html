<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vsen.ai Workshop - Introduction</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-8 { margin-top: 2rem; }
        .mt-12 { margin-top: 3rem; }
        .font-bold { font-weight: 700; color: #fff; }
        
        .logo-container {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        .logo-text {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div class="slide-container">
        <div class="content content-center">
            
            <div class="logo-container">
                <span class="logo-text">vsen</span>
            </div>
            
            <div class="badge">
                <i class="ph ph-rocket-launch"></i> A 2-Day Workshop by vsen.ai
            </div>
            
            <h1 class="title-main text-gradient">
                Breaking into the New Era of <br />
                <span class="text-gradient-accent">Software Engineering</span>
            </h1>
            
            <div class="mt-8 glass-card" style="display: inline-block; padding: 1rem 2rem;">
                <p class="subtitle" style="font-size: 1.25rem;">
                    with <span class="font-bold">Sandeep Mishra</span> & <span class="font-bold">Vikrant Upadhyay</span>
                </p>
            </div>
        </div>

        <div class="footer">
            <div class="footer-left" style="font-weight: 600; color: var(--text-primary);">vsen.ai</div>
            <div class="footer-center" style="font-family: var(--font-heading); letter-spacing: 0.1em; text-transform: uppercase;">From Pratapgarh to Global Tech.</div>
            <div class="footer-right">1 / 10</div>
        </div>
        <div class="progress-bar"></div>
    </div>

    <div class="nav-hint">
        Use <span class="key">&rarr;</span> or <span class="key">Space</span> to navigate
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
